<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("flo_theme")||"dark")</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flo — Expense Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root[data-theme="dark"]{--bg:#0c0c0f;--card:#141418;--card2:#18181d;--border:#1e1e27;--border2:#2a2a35;--text:#f4f4f5;--muted:#71717a;--muted2:#52525b;--accent:#a78bfa;--accent2:#ec4899;--accent-dim:rgba(167,139,250,0.12);--green:#4ade80;--red:#f87171;--orange:#fb923c;--inp-bg:#0c0c0f;}
    :root[data-theme="light"]{--bg:#f5f5fa;--card:#ffffff;--card2:#f8f8fc;--border:#e4e4f0;--border2:#d4d4e8;--text:#0c0c0f;--muted:#6b6b7b;--muted2:#9898ab;--accent:#7c3aed;--accent2:#db2777;--accent-dim:rgba(124,58,237,0.08);--green:#16a34a;--red:#dc2626;--orange:#d97706;--inp-bg:#f5f5fa;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;transition:background 0.2s;}
    .sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--card);border-right:1px solid var(--border);padding:20px 12px;display:flex;flex-direction:column;z-index:10;}
    .sidebar-logo{padding:4px 8px 20px;display:flex;align-items:center;gap:10px;}
    .logo-mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-text{font-size:14px;font-weight:800;letter-spacing:3px;color:var(--text);}
    .nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;margin-bottom:1px;}
    .nav-item:hover,.nav-item.active{background:var(--accent-dim);color:var(--accent);}
    .nav-icon{font-size:14px;width:16px;text-align:center;}
    .nav-ext{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:500;color:var(--accent2);cursor:pointer;transition:all 0.15s;text-decoration:none;margin-bottom:1px;background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.15);}
    .sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:8px;}
    .theme-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);}
    .toggle-track{width:32px;height:18px;background:var(--border2);border-radius:99px;position:relative;transition:background 0.2s;}
    .toggle-track.on{background:var(--accent);}
    .toggle-thumb{position:absolute;width:12px;height:12px;background:white;border-radius:50%;top:3px;left:3px;transition:transform 0.2s;}
    .toggle-track.on .toggle-thumb{transform:translateX(14px);}
    .user-pill{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:var(--card2);border:1px solid var(--border);}
    .user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;flex-shrink:0;}
    .user-name-pill{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .user-sub-pill{font-size:10px;color:var(--muted2);}
    .sign-out-btn{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:2px;}
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100;justify-content:space-around;}
    .bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 12px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:500;border:none;background:none;font-family:'Inter',sans-serif;}
    .bottom-nav-item.active{color:var(--accent);}
    .bottom-nav-icon{font-size:18px;}
    .mobile-topbar{display:none;position:fixed;top:0;left:0;right:0;background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;z-index:10;align-items:center;justify-content:space-between;}
    .main{margin-left:220px;padding:28px 32px 40px;max-width:calc(220px + 860px);}
    .page-header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
    .page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px;}
    .page-sub{font-size:12px;color:var(--muted);margin-top:3px;}
    .btn-new{display:flex;align-items:center;gap:6px;padding:10px 18px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:opacity 0.15s;}
    .btn-new:hover{opacity:0.9;}
    .goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:20px;}
    .goal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
    .goal-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
    .goal-emoji{font-size:1.5rem;margin-right:6px;}
    .goal-name{font-size:14px;font-weight:700;}
    .goal-target{font-size:11px;color:var(--muted);margin-bottom:10px;}
    .goal-actions{display:flex;gap:4px;}
    .goal-btn{background:none;border:none;font-size:12px;cursor:pointer;color:var(--muted);padding:3px 8px;border-radius:6px;font-family:'Inter',sans-serif;transition:all 0.15s;}
    .goal-btn:hover{background:var(--accent-dim);color:var(--accent);}
    .goal-btn.danger:hover{background:rgba(248,113,113,0.1);color:var(--red);}
    .progress-track{background:var(--border);border-radius:99px;height:8px;overflow:hidden;margin-bottom:10px;}
    .progress-fill{height:100%;border-radius:99px;transition:width 0.6s ease;}
    .goal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
    .goal-stat{background:var(--card2);border-radius:8px;padding:8px 10px;}
    .goal-stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted2);margin-bottom:3px;}
    .goal-stat-value{font-size:13px;font-weight:800;}
    .goal-stat-value.green{color:var(--green);}
    .goal-stat-value.accent{color:var(--accent);}
    .goal-stat-value.orange{color:var(--orange);}
    .deadline-badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:3px 10px;font-size:11px;margin-bottom:8px;}
    .deadline-badge.ok{background:rgba(74,222,128,0.1);color:var(--green);}
    .deadline-badge.urgent{background:rgba(251,146,60,0.1);color:var(--orange);}
    .deadline-badge.overdue{background:rgba(248,113,113,0.1);color:var(--red);}
    .add-savings-row{display:flex;gap:6px;margin-top:10px;}
    .savings-inp{flex:1;background:var(--inp-bg);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'Inter',sans-serif;color:var(--text);outline:none;}
    .savings-inp:focus{border-color:var(--accent);}
    .btn-add-savings{padding:7px 14px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;}
    .empty-goals{text-align:center;padding:4rem 2rem;color:var(--muted2);}
    .empty-icon{font-size:3rem;margin-bottom:12px;}
    .empty-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
    .empty-sub{font-size:12px;line-height:1.6;margin-bottom:20px;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:440px;width:92%;}
    .modal h2{font-size:15px;font-weight:800;margin-bottom:16px;color:var(--text);}
    .field{margin-bottom:10px;}
    .field label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted2);display:block;margin-bottom:5px;}
    .std-input{width:100%;background:var(--inp-bg);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
    .std-input:focus{border-color:var(--accent);}
    .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .modal-actions{display:flex;gap:8px;margin-top:16px;}
    .btn-primary{flex:1;padding:11px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;}
    .btn-cancel{padding:11px 18px;border-radius:9px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;}
    .emoji-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
    .emoji-opt{font-size:1.3rem;cursor:pointer;padding:3px 5px;border-radius:7px;border:2px solid transparent;transition:all 0.15s;}
    .emoji-opt.selected{border-color:var(--accent);background:var(--accent-dim);}
    #form-msg-modal{font-size:11px;color:var(--muted);margin-top:6px;min-height:14px;}
    @media(max-width:768px){.sidebar{display:none;}.bottom-nav{display:flex;}.mobile-topbar{display:flex;}.main{margin-left:0;padding:5rem 14px 6rem;}.goals-grid{grid-template-columns:1fr;}.modal-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo"><div class="logo-mark"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 8 Q5 3 8 8 Q11 13 14 8" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg></div><span class="logo-text">FLO</span></div>
    <a class="nav-item" onclick="location.href='/index.html'"><span class="nav-icon">⬡</span> Dashboard</a>
    <a class="nav-item" onclick="location.href='/charts.html'"><span class="nav-icon">◈</span> Charts</a>
    <a class="nav-item" onclick="location.href='/reports.html'"><span class="nav-icon">◧</span> Reports</a>
    <a class="nav-item active"><span class="nav-icon">✦</span> Planner</a>
    <a class="nav-item" onclick="location.href='/setup.html'"><span class="nav-icon">⊕</span> Edit budget</a>
    <a class="nav-item" onclick="location.href='/account.html'"><span class="nav-icon">◎</span> Account</a>
    <a class="nav-ext" href="#" onclick="showExtModal();return false;"><span class="nav-icon">⧉</span> Add extension</a>
    <div class="sidebar-bottom">
      <div class="theme-toggle" onclick="toggleTheme()"><span class="theme-label">Dark mode</span><div class="toggle-track on" id="toggle-track"><div class="toggle-thumb"></div></div></div>
      <div class="user-pill"><div class="user-avatar" id="user-initials">?</div><div style="flex:1;overflow:hidden;"><div class="user-name-pill" id="user-name">—</div><div class="user-sub-pill">Let your money flow</div></div><button class="sign-out-btn" onclick="signOut()">⇥</button></div>
    </div>
  </div>
  <div class="mobile-topbar">
    <div style="display:flex;align-items:center;gap:8px;"><div class="logo-mark" style="width:24px;height:24px;border-radius:7px;"><svg width="12" height="12" viewBox="0 0 16 16"><path d="M2 8 Q5 3 8 8 Q11 13 14 8" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg></div><span style="font-size:13px;font-weight:800;letter-spacing:2px;color:var(--text);">FLO</span></div>
    <div class="toggle-track" id="toggle-track-mobile" onclick="toggleTheme()" style="cursor:pointer;"><div class="toggle-thumb"></div></div>
  </div>
  <div class="bottom-nav">
    <button class="bottom-nav-item" onclick="location.href='/index.html'"><span class="bottom-nav-icon">⬡</span><span>Home</span></button>
    <button class="bottom-nav-item" onclick="location.href='/charts.html'"><span class="bottom-nav-icon">◈</span><span>Charts</span></button>
    <button class="bottom-nav-item active"><span class="bottom-nav-icon">✦</span><span>Planner</span></button>
    <button class="bottom-nav-item" onclick="location.href='/account.html'"><span class="bottom-nav-icon">◎</span><span>Account</span></button>
  </div>
  <div class="main"><div id="main-content">
    <div class="page-header">
      <div><div class="page-title">Expense planner</div><div class="page-sub">Plan and save for vacations and big purchases</div></div>
      <button class="btn-new" onclick="openNewGoal()">+ New goal</button>
    </div>
    <div class="goals-grid" id="goals-grid"></div>
  </div>
  <div class="modal-overlay" id="goal-modal">
    <div class="modal">
      <h2 id="modal-title">New saving goal</h2>
      <div class="field"><label>Pick an emoji</label><div class="emoji-row" id="emoji-row"></div></div>
      <div class="field"><label>Goal name</label><input type="text" class="std-input" id="goal-name" placeholder="e.g. Summer vacation, New MacBook" /></div>
      <div class="modal-row">
        <div class="field"><label>Target amount ($)</label><input type="number" class="std-input" id="goal-target" placeholder="e.g. 2000" oninput="calcMonthly()" /></div>
        <div class="field"><label>Already saved ($)</label><input type="number" class="std-input" id="goal-saved" placeholder="0" oninput="calcMonthly()" value="0" /></div>
      </div>
      <div class="modal-row">
        <div class="field"><label>Target date <span style="color:var(--muted2);font-weight:400;text-transform:none;">(optional)</span></label><input type="date" class="std-input" id="goal-date" oninput="calcMonthly()" /></div>
        <div class="field"><label>Monthly needed</label><input type="number" class="std-input" id="goal-monthly" placeholder="auto" readonly style="color:var(--accent);font-weight:700;" /></div>
      </div>
      <p id="form-msg-modal"></p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveGoal()">Save goal</button>
      </div>
    </div>
  </div>
  <div id="ext-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;" onclick="if(event.target===this)hideExtModal()">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:380px;width:92%;"><h2 style="font-size:15px;font-weight:800;margin-bottom:6px;color:var(--text);">⧉ Install the Flo extension</h2><p style="font-size:12px;color:var(--muted);margin-bottom:14px;">Get real-time advice while you shop.</p><div style="display:flex;gap:8px;"><button onclick="window.open('edge://extensions')" style="flex:1;padding:10px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;">Open extensions</button><button onclick="hideExtModal()" style="padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;">Close</button></div></div>
  </div>
  </div>
  <script type="module">
    import { supabase } from './Supabase.js'
    const _t=localStorage.getItem('flo_theme')||'dark'
    function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('flo_theme',t);document.querySelectorAll('.toggle-track').forEach(el=>el.className='toggle-track'+(t==='dark'?' on':''));document.querySelectorAll('.theme-label').forEach(el=>el.textContent=t==='dark'?'Dark mode':'Light mode')}
    applyTheme(_t)
    window.toggleTheme=()=>applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')
    window.showExtModal=()=>document.getElementById('ext-modal').style.display='flex'
    window.hideExtModal=()=>document.getElementById('ext-modal').style.display='none'
    const {data:{session}}=await supabase.auth.getSession()
    if(!session){localStorage.clear();location.href='/login.html'}
    const {data:{user:vu},error:ue}=await supabase.auth.getUser()
    if(!vu||ue){await supabase.auth.signOut();localStorage.clear();location.href='/login.html'}
    const user=session.user
    const p=user.user_metadata; document.getElementById('user-name').textContent=p?.full_name||p?.first_name||user.email; document.getElementById('user-initials').textContent=(p?.first_name?.[0]||user.email[0]).toUpperCase()
    window.signOut=async()=>{await supabase.auth.signOut();localStorage.clear();location.href='/login.html'}
    // Check subscription — Expense Planner is Pro only
    const { data: _prof } = await supabase.from('profiles').select('subscription_status').eq('id', user.id).single()
    const _isPro = ['active','trialing'].includes(_prof?.subscription_status||'free')
    if (!_isPro) {
      document.getElementById('main-content').style.display = 'none'
      const wall = document.createElement('div')
      wall.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem;'
      wall.innerHTML = `<div style="font-size:3rem;margin-bottom:16px;">✦</div>
        <h2 style="font-size:20px;font-weight:800;margin-bottom:8px;color:var(--text);">Expense Planner — Pro Feature</h2>
        <p style="font-size:14px;color:var(--muted);line-height:1.6;max-width:380px;margin-bottom:24px;">Upgrade to Flo Pro to unlock expense planner, AI insights, and more. Start with a 7-day free trial.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
          <button onclick="location.href='/pricing.html'" style="padding:12px 24px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;">Start free trial →</button>
          <button onclick="location.href='/index.html'" style="padding:12px 18px;border-radius:9px;border:1px solid var(--border);background:none;color:var(--muted);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;">Back to dashboard</button>
        </div>`
      document.querySelector('.main').appendChild(wall)
      return
    }

    const GOALS_KEY=`flo_goals_${user.id}`
    let goals=JSON.parse(localStorage.getItem(GOALS_KEY)||'[]')
    let editingIndex=null,selectedEmoji='✈️'
    const emojis=['✈️','🏖️','🚗','🏠','💍','🎓','💻','📱','🎸','🐕','🌍','🎉','🏋️','🛋️','🎁','💰']
    const emojiRow=document.getElementById('emoji-row'); emojiRow.innerHTML=''
    emojis.forEach(e=>{const span=document.createElement('span');span.className='emoji-opt'+(e===selectedEmoji?' selected':'');span.textContent=e;span.onclick=()=>{selectedEmoji=e;document.querySelectorAll('.emoji-opt').forEach(el=>el.classList.remove('selected'));span.classList.add('selected')};emojiRow.appendChild(span)})
    function saveGoals(){localStorage.setItem(GOALS_KEY,JSON.stringify(goals))}
    function monthsUntil(d){if(!d)return null;return Math.max(1,Math.round((new Date(d)-new Date())/(1000*60*60*24*30)))}
    window.calcMonthly=function(){const t=parseFloat(document.getElementById('goal-target').value)||0,s=parseFloat(document.getElementById('goal-saved').value)||0,d=document.getElementById('goal-date').value,r=Math.max(0,t-s);if(d&&r>0){document.getElementById('goal-monthly').value=Math.ceil(r/monthsUntil(d))}else document.getElementById('goal-monthly').value=''}
    window.openNewGoal=function(){editingIndex=null;selectedEmoji='✈️';document.getElementById('modal-title').textContent='New saving goal';document.getElementById('goal-name').value='';document.getElementById('goal-target').value='';document.getElementById('goal-saved').value='0';document.getElementById('goal-date').value='';document.getElementById('goal-monthly').value='';document.getElementById('form-msg-modal').textContent='';document.querySelectorAll('.emoji-opt').forEach((el,i)=>el.classList.toggle('selected',emojis[i]==='✈️'));document.getElementById('goal-modal').classList.add('show')}
    window.closeModal=()=>document.getElementById('goal-modal').classList.remove('show')
    window.saveGoal=function(){const name=document.getElementById('goal-name').value.trim(),target=parseFloat(document.getElementById('goal-target').value),saved=parseFloat(document.getElementById('goal-saved').value)||0,date=document.getElementById('goal-date').value,monthly=parseFloat(document.getElementById('goal-monthly').value)||0,msg=document.getElementById('form-msg-modal');if(!name){msg.textContent='Please enter a goal name.';return}if(!target||target<=0){msg.textContent='Please enter a valid target amount.';return}const goal={id:Date.now(),emoji:selectedEmoji,name,target,saved,date:date||null,monthly:monthly||null,createdAt:new Date().toISOString()};if(editingIndex!==null){goals[editingIndex]={...goals[editingIndex],...goal,id:goals[editingIndex].id}}else goals.push(goal);saveGoals();closeModal();renderGoals()}
    window.editGoal=function(idx){editingIndex=idx;const g=goals[idx];selectedEmoji=g.emoji||'✈️';document.getElementById('modal-title').textContent='Edit goal';document.getElementById('goal-name').value=g.name;document.getElementById('goal-target').value=g.target;document.getElementById('goal-saved').value=g.saved||0;document.getElementById('goal-date').value=g.date||'';document.getElementById('goal-monthly').value=g.monthly||'';document.getElementById('form-msg-modal').textContent='';document.querySelectorAll('.emoji-opt').forEach((el,i)=>el.classList.toggle('selected',emojis[i]===selectedEmoji));document.getElementById('goal-modal').classList.add('show')}
    window.deleteGoal=function(idx){if(!confirm('Delete this goal?'))return;goals.splice(idx,1);saveGoals();renderGoals()}
    window.addSavings=function(idx){const inp=document.getElementById(`si-${idx}`),amount=parseFloat(inp.value);if(!amount||amount<=0)return;goals[idx].saved=Math.min((goals[idx].saved||0)+amount,goals[idx].target);saveGoals();inp.value='';renderGoals()}
    function renderGoals(){
      const grid=document.getElementById('goals-grid')
      if(!goals.length){grid.innerHTML=`<div style="grid-column:1/-1;" class="empty-goals"><div class="empty-icon">✈️</div><div class="empty-title">No goals yet</div><div class="empty-sub">Create a saving goal for your next vacation, big purchase, or life event.</div><button class="btn-new" onclick="openNewGoal()">+ Create your first goal</button></div>`;return}
      grid.innerHTML=''
      goals.forEach((g,idx)=>{
        const pct=g.target>0?Math.min((g.saved/g.target)*100,100):0,remaining=Math.max(0,g.target-g.saved),complete=g.saved>=g.target,months=g.date?monthsUntil(g.date):null
        let deadlineBadge=''
        if(g.date){const days=Math.round((new Date(g.date)-new Date())/(1000*60*60*24)),label=new Date(g.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});if(days<0)deadlineBadge=`<div class="deadline-badge overdue">⚠ Deadline passed · ${label}</div>`;else if(days<60)deadlineBadge=`<div class="deadline-badge urgent">⏰ ${days} days left · ${label}</div>`;else deadlineBadge=`<div class="deadline-badge ok">📅 ${label}</div>`}
        const color=complete?'var(--green)':pct>=80?'var(--accent)':g.emoji?'var(--accent)':'var(--accent)'
        const card=document.createElement('div');card.className='goal-card'
        card.innerHTML=`<div class="goal-card-header"><div style="display:flex;align-items:center;gap:4px;"><span class="goal-emoji">${g.emoji||'🎯'}</span><div><div class="goal-name">${g.name}</div><div class="goal-target">$${Math.round(g.saved).toLocaleString()} saved of $${g.target.toLocaleString()}</div></div></div><div class="goal-actions"><button class="goal-btn" onclick="editGoal(${idx})">Edit</button><button class="goal-btn danger" onclick="deleteGoal(${idx})">Delete</button></div></div>${deadlineBadge}<div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div><div class="goal-stats"><div class="goal-stat"><div class="goal-stat-label">Progress</div><div class="goal-stat-value ${complete?'green':'accent'}">${Math.round(pct)}%</div></div><div class="goal-stat"><div class="goal-stat-label">Remaining</div><div class="goal-stat-value orange">$${Math.round(remaining).toLocaleString()}</div></div><div class="goal-stat"><div class="goal-stat-label">${months?'Need/mo':'Monthly'}</div><div class="goal-stat-value accent">${g.monthly?'$'+Math.round(g.monthly).toLocaleString():months?'$'+Math.ceil(remaining/months).toLocaleString():'—'}</div></div></div>${!complete?`<div class="add-savings-row"><input type="number" class="savings-inp" id="si-${idx}" placeholder="Add savings ($)" /><button class="btn-add-savings" onclick="addSavings(${idx})">+ Add</button></div>`:`<div style="text-align:center;padding:10px;font-size:13px;color:var(--green);font-weight:700;">🎉 Goal reached!</div>`}`
        grid.appendChild(card)
      })
    }
    renderGoals()
  </script>
</body>
</html>
