<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("flo_theme")||"dark")</script>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flo — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root[data-theme="dark"]{--bg:#0c0c0f;--card:#141418;--card2:#18181d;--border:#1e1e27;--text:#f4f4f5;--muted:#71717a;--muted2:#52525b;--accent:#a78bfa;--accent2:#ec4899;--accent-dim:rgba(167,139,250,0.12);--green:#4ade80;--red:#f87171;--inp-bg:#0c0c0f;}
    :root[data-theme="light"]{--bg:#f5f5fa;--card:#ffffff;--card2:#f8f8fc;--border:#e4e4f0;--text:#0c0c0f;--muted:#6b6b7b;--muted2:#9898ab;--accent:#7c3aed;--accent2:#db2777;--accent-dim:rgba(124,58,237,0.08);--green:#16a34a;--red:#dc2626;--inp-bg:#f5f5fa;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;transition:background 0.2s;}
    .wrapper{width:100%;max-width:400px;}
    .logo-area{text-align:center;margin-bottom:32px;}
    .logo-mark{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
    .logo-text{font-size:20px;font-weight:800;letter-spacing:4px;color:var(--text);}
    .tagline{font-size:12px;color:var(--muted);margin-top:4px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:background 0.2s;}
    .tab-switch{display:flex;background:var(--card2);border-radius:9px;padding:3px;margin-bottom:20px;gap:3px;}
    .tab-btn{flex:1;padding:7px;border:none;background:none;border-radius:7px;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;color:var(--muted);cursor:pointer;transition:all 0.15s;}
    .tab-btn.active{background:var(--card);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,0.15);}
    .field{margin-bottom:12px;}
    .field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted2);display:block;margin-bottom:5px;}
    .inp{width:100%;background:var(--inp-bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;}
    .inp:focus{border-color:var(--accent);}
    .name-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-primary{width:100%;padding:12px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;margin-top:4px;transition:opacity 0.15s;}
    .btn-primary:hover{opacity:0.9;}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;}
    .forgot-link{font-size:11px;color:var(--accent);background:none;border:none;font-family:'Inter',sans-serif;cursor:pointer;display:block;text-align:right;margin-top:-6px;margin-bottom:8px;}
    .magic-note{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.6;}
    #msg{font-size:12px;text-align:center;margin-top:10px;min-height:18px;color:var(--muted);}
    #msg.error{color:var(--red);}#msg.success{color:var(--green);}
    .terms-note{font-size:11px;color:var(--muted2);text-align:center;margin-top:12px;line-height:1.6;}
    .terms-note a{color:var(--accent);text-decoration:none;}
    .footer{text-align:center;font-size:11px;color:var(--muted2);margin-top:16px;display:flex;justify-content:center;gap:16px;}
    .footer a{color:var(--muted2);text-decoration:none;}
    .theme-btn{position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;}
    .deleted-banner{display:none;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--green);text-align:center;margin-bottom:14px;}
    .deleted-banner.show{display:block;}
    @media(max-width:420px){.name-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀ light</button>
  <div class="wrapper">
    <div class="logo-area">
      <div class="logo-mark"><svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 12 Q8 5 12 12 Q16 19 20 12" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg></div>
      <div class="logo-text">FLO</div>
      <div class="tagline">Let your money flow</div>
    </div>
    <div class="deleted-banner" id="deleted-banner">Account deleted. thanks for using flo.</div>
    <div class="card">
      <div class="tab-switch">
        <button class="tab-btn active" id="tab-signin" onclick="switchMode('signin')">Sign in</button>
        <button class="tab-btn" id="tab-signup" onclick="switchMode('signup')">Create Account</button>
        <button class="tab-btn" id="tab-magic" onclick="switchMode('magic')">Magic link</button>
      </div>
      <div id="mode-signin">
        <div class="field"><label>Email</label><input class="inp" id="signin-email" type="email" placeholder="you@example.com" /></div>
        <div class="field"><label>Password</label><input class="inp" id="signin-password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()" /></div>
        <button class="forgot-link" onclick="forgotPassword()">Forgot password?</button>
        <button class="btn-primary" id="signin-btn" onclick="signIn()">Sign in</button>
      </div>
      <div id="mode-signup" style="display:none;">
        <div class="name-row">
          <div class="field"><label>First name</label><input class="inp" id="signup-first" type="text" placeholder="Alex" /></div>
          <div class="field"><label>Last name</label><input class="inp" id="signup-last" type="text" placeholder="Smith" /></div>
        </div>
        <div class="field"><label>Email</label><input class="inp" id="signup-email" type="email" placeholder="you@example.com" /></div>
        <div class="field"><label>Password</label><input class="inp" id="signup-password" type="password" placeholder="at least 6 characters" onkeydown="if(event.key==='Enter')signUp()" /></div>
        <button class="btn-primary" id="signup-btn" onclick="signUp()">Create Account</button>
        <div class="terms-note">By signing up you agree to our <a href="/terms.html">terms</a> and <a href="/privacy.html">Privacy Policy</a>.</div>
      </div>
      <div id="mode-magic" style="display:none;">
        <div class="field"><label>Email</label><input class="inp" id="magic-email" type="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')sendMagicLink()" /></div>
        <button class="btn-primary" id="magic-btn" onclick="sendMagicLink()">send Magic link ✨</button>
        <p class="magic-note">we'll send a one-click Sign in link — no password needed.</p>
      </div>
      <p id="msg"></p>
    </div>
    <div class="footer"><a href="/terms.html">terms</a><a href="/privacy.html">privacy</a><span>flo — smart budgeting</span></div>
  </div>
  <script type="module">
    import { supabase } from './Supabase.js'
    const _t = localStorage.getItem('flo_theme')||'dark'
    document.documentElement.setAttribute('data-theme',_t)
    document.getElementById('theme-btn').textContent = _t==='dark'?'☀ light':'☾ dark'
    window.toggleTheme = () => {
      const t = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'
      document.documentElement.setAttribute('data-theme',t); localStorage.setItem('flo_theme',t)
      document.getElementById('theme-btn').textContent = t==='dark'?'☀ light':'☾ dark'
    }
    const { data: { session } } = await supabase.auth.getSession()
    if (session) location.href='/index.html'
    supabase.auth.onAuthStateChange((event, session) => { if ((event==='SIGNED_IN'||event==='USER_UPDATED') && session) location.href='/index.html' })
    const params = new URLSearchParams(location.search)
    if (params.get('deleted')==='true') document.getElementById('deleted-banner').classList.add('show')
    window.switchMode = m => {
      ;['signin','signup','magic'].forEach(x => { document.getElementById('mode-'+x).style.display=x===m?'block':'none'; document.getElementById('tab-'+x).classList.toggle('active',x===m) })
      document.getElementById('msg').textContent=''; document.getElementById('msg').className=''
    }
    window.signIn = async () => {
      const email=document.getElementById('signin-email').value.trim(), password=document.getElementById('signin-password').value
      const msg=document.getElementById('msg'), btn=document.getElementById('signin-btn')
      if (!email||!password){msg.textContent='fill in both fields.';msg.className='error';return}
      btn.disabled=true;btn.textContent='signing in...'
      const {error}=await supabase.auth.signInWithPassword({email,password})
      if(error){msg.textContent=error.message;msg.className='error';btn.disabled=false;btn.textContent='Sign in';return}
      location.href='/index.html'
    }
    window.signUp = async () => {
      const first=document.getElementById('signup-first').value.trim(), last=document.getElementById('signup-last').value.trim()
      const email=document.getElementById('signup-email').value.trim(), password=document.getElementById('signup-password').value
      const msg=document.getElementById('msg'), btn=document.getElementById('signup-btn')
      if(!email||!password){msg.textContent='fill in email and password.';msg.className='error';return}
      if(password.length<6){msg.textContent='password must be at least 6 characters.';msg.className='error';return}
      btn.disabled=true;btn.textContent='creating Account...'
      const fullName=[first,last].filter(Boolean).join(' ')||email
      const {data,error}=await supabase.auth.signUp({email,password,options:{data:{full_name:fullName,first_name:first,last_name:last},emailRedirectTo:location.origin+'/auth-confirm.html'}})
      if(error){msg.textContent=error.message;msg.className='error';btn.disabled=false;btn.textContent='Create Account';return}
      if(data.user) await supabase.from('profiles').upsert({id:data.user.id,full_name:fullName,first_name:first,last_name:last,email})
      if(data.session){location.href='/setup.html'}else{msg.textContent='✓ check your email for a confirmation link!';msg.className='success';btn.disabled=false;btn.textContent='Create Account'}
    }
    window.sendMagicLink = async () => {
      const email=document.getElementById('magic-email').value.trim(), msg=document.getElementById('msg'), btn=document.getElementById('magic-btn')
      if(!email){msg.textContent='enter your email.';msg.className='error';return}
      btn.disabled=true;btn.textContent='sending...'
      const {error}=await supabase.auth.signInWithOtp({email,options:{emailRedirectTo:location.origin+'/auth-confirm.html'}})
      if(error){msg.textContent=error.message;msg.className='error';btn.disabled=false;btn.textContent='send Magic link ✨';return}
      msg.textContent='✓ Magic link sent! check your email.';msg.className='success';btn.disabled=false;btn.textContent='Resend link'
    }
    window.forgotPassword = async () => {
      const email=document.getElementById('signin-email').value.trim(), msg=document.getElementById('msg')
      if(!email){msg.textContent='enter your email above first.';msg.className='error';return}
      const {error}=await supabase.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/auth-confirm.html?type=recovery'})
      if(error){msg.textContent=error.message;msg.className='error';return}
      msg.textContent='✓ password reset email sent!';msg.className='success'
    }
  </script>
</body>
</html>
